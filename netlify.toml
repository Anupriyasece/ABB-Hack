[build]
  command = "npx pnpm build"
  publish = "dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_BACKEND_URL/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/storage/*"
  to = "https://YOUR_RENDER_BACKEND_URL/storage/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
